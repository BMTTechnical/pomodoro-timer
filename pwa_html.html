<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Pomodoro Timer</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#f5f1eb"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Pomodoro"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{background:#f5f1eb}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function gearPts(oR, iR, n) {
  let s = '';
  for (let i = 0; i < n; i++) {
    const a = j => ((i + j) / n) * Math.PI * 2;
    s += `${iR*Math.cos(a(0))},${iR*Math.sin(a(0))} `;
    s += `${oR*Math.cos(a(.36))},${oR*Math.sin(a(.36))} `;
    s += `${oR*Math.cos(a(.64))},${oR*Math.sin(a(.64))} `;
    s += `${iR*Math.cos(a(1))},${iR*Math.sin(a(1))} `;
  }
  return s.trim();
}

const GEARS = [
  { id:'A', x:278, y:34,  oR:52, iR:41, h:9, t:14, spd:.014, rev:false },
  { id:'B', x:314, y:128, oR:30, iR:23, h:5, t:8,  spd:.024, rev:true  },
  { id:'C', x:42,  y:286, oR:52, iR:41, h:9, t:14, spd:.014, rev:true  },
  { id:'D', x:6,   y:192, oR:30, iR:23, h:5, t:8,  spd:.024, rev:false },
  { id:'E', x:34,  y:34,  oR:40, iR:31, h:7, t:11, spd:.018, rev:true  },
  { id:'F', x:286, y:286, oR:40, iR:31, h:7, t:11, spd:.018, rev:false },
];

// localStorage helpers (replaces window.storage from Claude)
const store = {
  get: k => { try { return localStorage.getItem(k); } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem(k,v); } catch {} },
  del: k => { try { localStorage.removeItem(k); } catch {} },
};

function PomodoroTimer() {
  const DEF = { work:25, short:5, long:15 };
  const [mode,  setMode]  = useState('work');
  const [cfg,   setCfg]   = useState(DEF);
  const [tLeft, setTLeft] = useState(DEF.work * 60);
  const [on,    setOn]    = useState(false);
  const [cnt,   setCnt]   = useState(0);
  const [hist,  setHist]  = useState([]);
  const [tot,   setTot]   = useState(0);
  const [panel, setPanel] = useState('');
  const [draft, setDraft] = useState(DEF);

  const modeRef = useRef(mode), cfgRef = useRef(cfg), cntRef = useRef(cnt);
  modeRef.current = mode; cfgRef.current = cfg; cntRef.current = cnt;

  const gRefs   = useRef(GEARS.map(() => null));
  const gAngles = useRef(GEARS.map(() => 0));
  const rafId   = useRef(null);
  const rafLast = useRef(null);

  // Load persisted data
  useEffect(() => {
    const h = store.get('pm:h'); if (h) setHist(JSON.parse(h));
    const t = store.get('pm:t'); if (t) setTot(+t || 0);
  }, []);

  // Gear animation
  useEffect(() => {
    if (!on) { cancelAnimationFrame(rafId.current); rafLast.current = null; return; }
    const tick = ts => {
      if (rafLast.current !== null) {
        const dt = ts - rafLast.current;
        GEARS.forEach((g, i) => {
          gAngles.current[i] += g.spd * dt * (g.rev ? -1 : 1);
          gRefs.current[i]?.setAttribute('transform', `rotate(${gAngles.current[i] % 360})`);
        });
      }
      rafLast.current = ts;
      rafId.current = requestAnimationFrame(tick);
    };
    rafId.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafId.current);
  }, [on]);

  const chime = () => {
    try {
      const ac = new AudioContext();
      [[523,.0],[659,.18],[784,.36]].forEach(([f, t]) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.frequency.value = f;
        g.gain.setValueAtTime(.18, ac.currentTime + t);
        g.gain.exponentialRampToValueAtTime(.001, ac.currentTime + t + .55);
        o.start(ac.currentTime + t); o.stop(ac.currentTime + t + .65);
      });
    } catch {}
  };

  const onDone = useCallback(() => {
    const m = modeRef.current, s = cfgRef.current, c = cntRef.current;
    chime();
    if (m === 'work') {
      const entry = { id: Date.now(), ts: new Date().toISOString(), min: s.work };
      setHist(prev => { const u = [entry,...prev].slice(0,100); store.set('pm:h', JSON.stringify(u)); return u; });
      setTot(prev => { const u = prev + s.work; store.set('pm:t', String(u)); return u; });
      const nc = c + 1; setCnt(nc);
      const nm = nc % 4 === 0 ? 'long' : 'short';
      setMode(nm); setTLeft(s[nm] * 60);
    } else { setMode('work'); setTLeft(s.work * 60); }
    setOn(false);
  }, []);

  useEffect(() => {
    if (!on) return;
    const id = setInterval(() => {
      setTLeft(t => { if (t <= 1) { clearInterval(id); setTimeout(onDone,0); return 0; } return t-1; });
    }, 1000);
    return () => clearInterval(id);
  }, [on, onDone]);

  const toggle   = () => setOn(v => !v);
  const reset    = () => { setOn(false); setTLeft(cfg[mode]*60); };
  const swMode   = m  => { setOn(false); setMode(m); setTLeft(cfg[m]*60); };
  const apply    = () => { setCfg(draft); setTLeft(draft[mode]*60); setOn(false); setPanel(''); };
  const clearAll = () => { setHist([]); setTot(0); store.del('pm:h'); store.del('pm:t'); };

  const dur  = cfg[mode]*60, prog = (dur-tLeft)/dur;
  const mm   = String(Math.floor(tLeft/60)).padStart(2,'0');
  const ss   = String(tLeft%60).padStart(2,'0');
  const el   = dur-tLeft, secA = (el%60)/60*360, minA = el/dur*360;
  const R=112, CIR=2*Math.PI*R, DASH=prog*CIR;
  const COL  = {work:'#2b2620',short:'#3e6e52',long:'#3d5e72'}[mode];
  const LBL  = {work:'Focus',short:'Short Break',long:'Long Break'}[mode];
  const fTot = tot>=60 ? `${Math.floor(tot/60)}h ${tot%60}m` : `${tot}m`;
  const fmtD = iso => { const d=new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); };
  const cBtn = (x={}) => ({width:42,height:42,borderRadius:'50%',border:'1px solid #ddd8cc',background:'#fff',cursor:'pointer',color:'#b0a898',display:'flex',alignItems:'center',justifyContent:'center',...x});

  return (
    <div style={{minHeight:'100vh',background:'#f5f1eb',display:'flex',flexDirection:'column',alignItems:'center',paddingTop:36,paddingBottom:48,fontFamily:'system-ui,-apple-system,sans-serif',color:'#1a1a1a'}}>
      <p style={{margin:'0 0 24px',fontSize:11,letterSpacing:5,textTransform:'uppercase',color:'#a09888'}}>Pomodoro</p>

      <div style={{position:'relative',width:320,height:320,marginBottom:20}}>
        <svg width="320" height="320" viewBox="0 0 320 320" overflow="hidden" style={{position:'absolute',inset:0,display:'block'}}>
          <g opacity=".17">
            {GEARS.map((g,i) => (
              <g key={g.id} transform={`translate(${g.x},${g.y})`}>
                <g ref={el => gRefs.current[i]=el}>
                  <polygon points={gearPts(g.oR,g.iR,g.t)} fill="#a09878" stroke="#8f8768" strokeWidth=".6"/>
                  <circle r={g.iR*.6} fill="#a09878" stroke="#8f8768" strokeWidth=".5"/>
                  {[0,1,2].map(s => { const sa=(s/3)*Math.PI*2; return <line key={s} x1="0" y1="0" x2={g.iR*.54*Math.cos(sa)} y2={g.iR*.54*Math.sin(sa)} stroke="#8f8768" strokeWidth="1.5"/>; })}
                </g>
                <circle r={g.h} fill="#f5f1eb" stroke="#8f8768" strokeWidth=".5"/>
              </g>
            ))}
          </g>
          <circle cx="160" cy="160" r="128" fill="#f5f1eb" opacity=".92"/>
          {[...Array(60)].map((_,i) => { const a=(i/60)*Math.PI*2-Math.PI/2,mj=i%5===0; return <line key={i} x1={160+(mj?102:107)*Math.cos(a)} y1={160+(mj?102:107)*Math.sin(a)} x2={160+113*Math.cos(a)} y2={160+113*Math.sin(a)} stroke={mj?'#b5ad9e':'#ddd5ca'} strokeWidth={mj?1.5:.75}/>; })}
          <circle cx="160" cy="160" r={R} fill="none" stroke="#e5dfd2" strokeWidth="2.5"/>
          <circle cx="160" cy="160" r={R} fill="none" stroke={COL} strokeWidth="2.5" strokeDasharray={`${DASH} ${CIR-DASH}`} strokeLinecap="round" transform="rotate(-90 160 160)" style={{transition:'stroke-dasharray 1s linear,stroke .5s ease'}}/>
          <line x1="160" y1="160" x2={160+62*Math.sin(minA*Math.PI/180)} y2={160-62*Math.cos(minA*Math.PI/180)} stroke={COL} strokeWidth="2.5" strokeLinecap="round" opacity=".45"/>
          <g transform={`rotate(${secA},160,160)`}>
            <line x1="160" y1={160+16} x2="160" y2={160-80} stroke="#c04030" strokeWidth="1.5" strokeLinecap="round" opacity=".65"/>
          </g>
          <circle cx="160" cy="160" r="5.5" fill={COL} style={{transition:'fill .5s'}}/>
          <circle cx="160" cy="160" r="2.5" fill="#f5f1eb"/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none',userSelect:'none'}}>
          <div style={{fontSize:10,letterSpacing:4,textTransform:'uppercase',color:COL,marginBottom:7,transition:'color .5s'}}>{LBL}</div>
          <div style={{fontSize:58,fontWeight:200,letterSpacing:3,lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{mm}:{ss}</div>
          <div style={{display:'flex',gap:7,marginTop:13}}>
            {[0,1,2,3].map(i => <div key={i} style={{width:6,height:6,borderRadius:'50%',background:i<(cnt%4)?COL:'#ddd6ca',transition:'background .4s'}}/>)}
          </div>
        </div>
      </div>

      <div style={{display:'flex',gap:2,background:'#e7e2d5',borderRadius:9,padding:3,marginBottom:20}}>
        {[['work','Focus'],['short','Short'],['long','Long']].map(([k,l]) => (
          <button key={k} onClick={()=>swMode(k)} style={{padding:'6px 20px',borderRadius:7,border:'none',cursor:'pointer',background:mode===k?'#fff':'transparent',color:mode===k?COL:'#b0a090',fontSize:12,fontWeight:mode===k?500:400,letterSpacing:.5,boxShadow:mode===k?'0 1px 3px rgba(0,0,0,.08)':'none',transition:'all .2s'}}>{l}</button>
        ))}
      </div>

      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:26}}>
        <button onClick={reset} style={cBtn({fontSize:20})}>↺</button>
        <button onClick={toggle} style={{width:70,height:70,borderRadius:'50%',border:'none',background:COL,color:'#fff',cursor:'pointer',fontSize:24,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 4px 20px ${COL}3a`,transition:'background .5s,box-shadow .5s'}}>{on?'⏸':'▶'}</button>
        <button onClick={()=>setPanel(p=>p==='set'?'':'set')} style={cBtn({fontSize:16,background:panel==='set'?'#e7e2d5':'#fff'})}>⚙</button>
      </div>

      <div style={{display:'flex',gap:20,marginBottom:16,alignItems:'center'}}>
        <div style={{textAlign:'center'}}><div style={{fontSize:22,fontWeight:200}}>{cnt}</div><div style={{fontSize:10,color:'#a09888',letterSpacing:1.5,textTransform:'uppercase'}}>Sessions</div></div>
        <div style={{width:1,height:30,background:'#ddd6ca'}}/>
        <div style={{textAlign:'center'}}><div style={{fontSize:22,fontWeight:200}}>{fTot}</div><div style={{fontSize:10,color:'#a09888',letterSpacing:1.5,textTransform:'uppercase'}}>Total Focus</div></div>
        <div style={{width:1,height:30,background:'#ddd6ca'}}/>
        <div style={{textAlign:'center',cursor:'pointer'}} onClick={()=>setPanel(p=>p==='hist'?'':'hist')}>
          <div style={{fontSize:22,fontWeight:200}}>{hist.length}</div>
          <div style={{fontSize:10,color:'#a09888',letterSpacing:1.5,textTransform:'uppercase'}}>History {panel==='hist'?'▴':'▾'}</div>
        </div>
      </div>

      {panel==='hist' && (
        <div style={{width:'100%',maxWidth:350,background:'#fff',borderRadius:12,border:'1px solid #e3ddd0',padding:'16px 18px',marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontSize:10,letterSpacing:3,textTransform:'uppercase',color:'#a09888'}}>Session History</span>
            <button onClick={clearAll} style={{fontSize:11,color:'#c0b8a8',background:'none',border:'none',cursor:'pointer'}}>Clear all</button>
          </div>
          <div style={{maxHeight:210,overflowY:'auto'}}>
            {hist.length===0
              ? <p style={{textAlign:'center',color:'#c0b8a8',fontSize:13,margin:'12px 0'}}>No sessions yet</p>
              : hist.map(h => <div key={h.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #f0e8de'}}><span style={{fontSize:13,color:'#555'}}>{fmtD(h.ts)}</span><span style={{fontSize:13,color:'#a09888'}}>{h.min} min</span></div>)
            }
          </div>
        </div>
      )}

      {panel==='set' && (
        <div style={{width:'100%',maxWidth:350,background:'#fff',borderRadius:12,border:'1px solid #e3ddd0',padding:'16px 18px'}}>
          <div style={{fontSize:10,letterSpacing:3,textTransform:'uppercase',color:'#a09888',marginBottom:14}}>Timer Settings</div>
          {[['work','Focus'],['short','Short Break'],['long','Long Break']].map(([k,l]) => (
            <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <span style={{fontSize:14}}>{l}</span>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <button onClick={()=>setDraft(d=>({...d,[k]:Math.max(1,d[k]-1)}))} style={{width:30,height:30,borderRadius:'50%',border:'1px solid #ddd8cc',background:'none',cursor:'pointer',fontSize:18,color:'#999',display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                <span style={{minWidth:26,textAlign:'center',fontSize:15}}>{draft[k]}</span>
                <button onClick={()=>setDraft(d=>({...d,[k]:Math.min(99,d[k]+1)}))} style={{width:30,height:30,borderRadius:'50%',border:'1px solid #ddd8cc',background:'none',cursor:'pointer',fontSize:18,color:'#999',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
              </div>
            </div>
          ))}
          <button onClick={apply} style={{width:'100%',padding:10,background:'#2b2620',color:'#fff',border:'none',borderRadius:7,cursor:'pointer',fontSize:10,letterSpacing:3,textTransform:'uppercase',marginTop:4}}>Apply</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PomodoroTimer/>);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
